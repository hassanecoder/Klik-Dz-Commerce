kind = "web"
previewPath = "/"
title = "KlikDz - Algerian Marketplace"
version = "1.0.0"
id = "artifacts/klikdz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22769

[services.development]
run = "pnpm --filter @workspace/klikdz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/klikdz", "run", "build" ]
publicDir = "artifacts/klikdz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22769"
BASE_PATH = "/"
